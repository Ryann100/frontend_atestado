<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestão de Atestados — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="bg-grid"></div>
  <div class="spotlight" id="spotlight"></div>
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>

  <div class="card" role="main">

    <div class="logo-wrap">
      <div class="logo-box">
        <img src="assets/logo.png" alt="Logo da empresa">
      </div>
    </div>

    <h1 class="card-title">Gestão de Atestados</h1>
    <p class="card-sub">Acesse com seu usuário corporativo</p>

    <form class="form" id="loginForm" novalidate>

      <div class="field">
        <label for="usuario">Usuário</label>
        <div class="input-wrap">
          <span class="input-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <circle cx="12" cy="8" r="4"/>
              <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
            </svg>
          </span>
          <input type="text" id="usuario" placeholder="seu.usuario" autocomplete="username" spellcheck="false">
        </div>
      </div>

      <div class="field">
        <label for="senha">Senha</label>
        <div class="input-wrap">
          <span class="input-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <rect x="3" y="11" width="18" height="11" rx="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
          </span>
          <input type="password" id="senha" placeholder="••••••••" autocomplete="current-password">
          <button type="button" class="toggle-pw" id="togglePw" aria-label="Mostrar senha">
            <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="opts-row">
        <label class="checkbox-wrap">
          <input type="checkbox" id="lembrar">
          <div class="custom-check">
            <svg viewBox="0 0 10 10" fill="none" stroke="white" stroke-width="2" stroke-linecap="round">
              <path d="M2 5l2.5 2.5L8 2.5"/>
            </svg>
          </div>
          <span>Lembrar acesso</span>
        </label>
      </div>

      <div class="alert" id="alertBox" role="alert">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <span id="alertMsg">Usuário ou senha incorretos.</span>
      </div>

      <button type="submit" class="btn-login" id="loginBtn">
        <span class="btn-text">Entrar</span>
        <span class="btn-spinner">
          <svg class="spinner-svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round">
            <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
          </svg>
        </span>
      </button>

    </form>

    <div class="card-footer">
      Problemas de acesso? <a href="#">Fale com o TI</a>
    </div>

  </div>

  <script src="js/login.js"></script>
</body>
</html>
