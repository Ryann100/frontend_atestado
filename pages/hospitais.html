<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestão de Atestados — Hospitais e Médicos</title>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/home.css">
  <link rel="stylesheet" href="../css/hospitais.css">
</head>

<body>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo"><img src="../assets/logo.png" alt="Logo"></div>
    <nav class="sidebar-nav">
      <a href="home.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
          <polyline points="9 22 9 12 15 12 15 22" />
        </svg>
        <span>Início</span>
      </a>
      <a href="atestados.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <rect x="5" y="2" width="14" height="20" rx="2" />
          <path d="M9 7h6M9 11h6M9 15h4" />
        </svg>
        <span>Atestados</span>
      </a>
      <a href="lista-colaboradores.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <circle cx="9" cy="7" r="4" />
          <path d="M3 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2" />
          <path d="M16 3.13a4 4 0 0 1 0 7.75" />
          <path d="M21 21v-2a4 4 0 0 0-3-3.85" />
        </svg>
        <span>Colaboradores</span>
      </a>
      <a href="hospitais.html" class="nav-item active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <rect x="2" y="7" width="20" height="15" rx="2" />
          <path d="M8 7V5a4 4 0 0 1 8 0v2" />
          <path d="M12 12v4M10 14h4" />
        </svg>
        <span>Hospitais</span>
      </a>
      <a href="dashboard.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <rect x="2" y="3" width="6" height="6" rx="1" />
          <rect x="9" y="3" width="6" height="6" rx="1" />
          <rect x="16" y="3" width="6" height="6" rx="1" />
          <rect x="2" y="10" width="6" height="6" rx="1" />
          <rect x="9" y="10" width="6" height="6" rx="1" />
          <rect x="16" y="10" width="6" height="6" rx="1" />
        </svg>
        <span>Dashboard</span>
      </a>
    </nav>
    <div class="sidebar-footer">
      <a href="perfil.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <circle cx="12" cy="8" r="4" />
          <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" />
        </svg>
        <span>Meu perfil</span>
      </a>
      <a href="../login.html" class="nav-item nav-logout">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
          <polyline points="16 17 21 12 16 7" />
          <line x1="21" y1="12" x2="9" y2="12" />
        </svg>
        <span>Sair</span>
      </a>
    </div>
  </aside>

  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <div class="main-wrap">
    <header class="topbar">
      <button class="menu-toggle" id="menuToggle" aria-label="Abrir menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="3" y1="6" x2="21" y2="6" />
          <line x1="3" y1="12" x2="21" y2="12" />
          <line x1="3" y1="18" x2="21" y2="18" />
        </svg>
      </button>
      <div class="topbar-greeting">
        <span class="topbar-title">Hospitais e Médicos</span>
        <span class="topbar-sub">Cadastro de unidades de saúde e médicos</span>
      </div>
      <div class="topbar-actions">
        <button class="topbar-btn" aria-label="Notificações" onclick="location.href='notificacoes.html'">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
            <path d="M13.73 21a2 2 0 0 1-3.46 0" />
          </svg>
          <span class="notif-dot"></span>
        </button>
        <div class="topbar-avatar" onclick="location.href='perfil.html'" style="cursor:pointer">MR</div>
      </div>
    </header>

    <main class="content">

      <!-- ── Tabs ── -->
      <div class="tabs-wrap">
        <button class="tab-btn active" data-tab="hospitais">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" width="15"
            height="15">
            <rect x="2" y="7" width="20" height="15" rx="2" />
            <path d="M8 7V5a4 4 0 0 1 8 0v2" />
            <path d="M12 12v4M10 14h4" />
          </svg>
          Hospitais e Clínicas
        </button>
        <button class="tab-btn" data-tab="medicos">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" width="15"
            height="15">
            <path d="M22 12h-4l-3 9L9 3l-3 9H2" />
          </svg>
          Médicos
        </button>
      </div>

      <!-- ══ TAB HOSPITAIS ══ -->
      <div id="tabHospitais" class="tab-content active">
        <div class="section-toolbar">
          <div class="busca-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <circle cx="11" cy="11" r="8" />
              <line x1="21" y1="21" x2="16.65" y2="16.65" />
            </svg>
            <input type="text" class="filtro-input" id="buscaHospital" placeholder="Buscar hospital ou clínica...">
          </div>
          <div class="toolbar-right">
            <select class="filtro-select" id="filtroTipoHosp">
              <option value="">Todos os tipos</option>
              <option>Hospital</option>
              <option>UPA</option>
              <option>Clínica</option>
              <option>Pronto-socorro</option>
              <option>Consultório</option>
            </select>
            <button class="btn-primary" id="btnNovoHospital">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
                width="14" height="14">
                <line x1="12" y1="5" x2="12" y2="19" />
                <line x1="5" y1="12" x2="19" y2="12" />
              </svg>
              Cadastrar hospital
            </button>
          </div>
        </div>

        <div class="table-wrap">
          <table class="table">
            <thead>
              <tr>
                <th>Nome</th>
                <th>Tipo</th>
                <th>Endereço</th>
                <th>Atestados</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="tbodyHospitais"></tbody>
          </table>
        </div>
      </div>

      <!-- ══ TAB MÉDICOS ══ -->
      <div id="tabMedicos" class="tab-content">
        <div class="section-toolbar">
          <div class="busca-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <circle cx="11" cy="11" r="8" />
              <line x1="21" y1="21" x2="16.65" y2="16.65" />
            </svg>
            <input type="text" class="filtro-input" id="buscaMedico" placeholder="Buscar médico ou CRM...">
          </div>
          <div class="toolbar-right">
            <select class="filtro-select" id="filtroStatusCrm">
              <option value="">Todos os status</option>
              <option value="valido">CRM Válido</option>
              <option value="irregular">CRM Irregular</option>
            </select>
            <button class="btn-primary" id="btnNovoMedico">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
                width="14" height="14">
                <line x1="12" y1="5" x2="12" y2="19" />
                <line x1="5" y1="12" x2="19" y2="12" />
              </svg>
              Cadastrar médico
            </button>
          </div>
        </div>

        <div class="alerta-crm" id="alertaCrm" style="display:none">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" width="16"
            height="16">
            <circle cx="12" cy="12" r="10" />
            <line x1="12" y1="8" x2="12" y2="12" />
            <line x1="12" y1="16" x2="12.01" y2="16" />
          </svg>
          <span id="alertaCrmTexto"></span>
        </div>

        <div class="table-wrap">
          <table class="table">
            <thead>
              <tr>
                <th>Médico</th>
                <th>CRM</th>
                <th>Especialidade</th>
                <th>Hospital vínculo</th>
                <th>Atestados</th>
                <th>Status CRM</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="tbodyMedicos"></tbody>
          </table>
        </div>
      </div>

    </main>
  </div>

  <!-- ── Modal Hospital ── -->
  <div class="modal-overlay" id="modalHospital">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-titulo" id="modalHospitalTitulo">Cadastrar hospital</div>
        <button class="modal-fechar" id="fecharModalHospital">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" width="16"
            height="16">
            <line x1="18" y1="6" x2="6" y2="18" />
            <line x1="6" y1="6" x2="18" y2="18" />
          </svg>
        </button>
      </div>
      <div class="modal-form">
        <form autocomplete="off">
          <div class="form-grid-2">
            <div class="form-group full">
              <label class="form-label">Nome *</label>
              <input type="text" class="form-input" id="hospNome" placeholder="Nome da unidade">
            </div>
            <div class="form-group">
              <label class="form-label">Tipo *</label>
              <select class="form-input form-select" id="hospTipo">
                <option value="">Selecione...</option>
                <option>Hospital</option>
                <option>UPA</option>
                <option>Clínica</option>
                <option>Pronto-socorro</option>
                <option>Consultório</option>
              </select>
            </div>
            <div class="form-group full">
              <label class="form-label">Endereço</label>
              <input type="text" class="form-input" id="hospEndereco" placeholder="Endereço completo">
            </div>
          </div>
        </form>
      </div>
      <div class="modal-actions">
        <button class="btn-outline" id="cancelarHospital">Cancelar</button>
        <button class="btn-primary" id="salvarHospital">Salvar hospital</button>
      </div>
    </div>
  </div>

  <!-- ── Modal Médico ── -->
  <div class="modal-overlay" id="modalMedico">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-titulo" id="modalMedicoTitulo">Cadastrar médico</div>
        <button class="modal-fechar" id="fecharModalMedico">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" width="16"
            height="16">
            <line x1="18" y1="6" x2="6" y2="18" />
            <line x1="6" y1="6" x2="18" y2="18" />
          </svg>
        </button>
      </div>
      <div class="modal-form">
        <div class="form-grid-2">
          <div class="form-group">
            <label class="form-label">CRM *</label>
            <div class="crm-field-wrap">
              <input type="text" class="form-input" id="medCrm" placeholder="Ex: CRM/SP 12345">
              <div class="crm-status-badge" id="medCrmStatus"></div>
            </div>
            <span class="form-hint" id="medCrmHint">Informe o CRM para validação automática</span>
          </div>
          <div class="form-group">
            <label class="form-label">Nome *</label>
            <input type="text" class="form-input" id="medNome" placeholder="Nome completo">
          </div>
          <div class="form-group">
            <label class="form-label">Especialidade</label>
            <input type="text" class="form-input" id="medEspecialidade" placeholder="Ex: Clínica Geral">
          </div>
          <div class="form-group full">
            <label class="form-label">Hospitais vínculo</label>
            <div class="hospitais-check-lista" id="medHospitaisCheck"></div>
          </div>
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn-outline" id="cancelarMedico">Cancelar</button>
        <button class="btn-primary" id="salvarMedico">Salvar médico</button>
      </div>
    </div>
  </div>

  <script src="../js/hospitais.js"></script>
</body>

</html>
