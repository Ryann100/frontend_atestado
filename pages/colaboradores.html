<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestão de Atestados — Ficha do Colaborador</title>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/home.css">
  <link rel="stylesheet" href="../css/colaboradores.css">
</head>

<body>

  <!-- ── Sidebar ── -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <img src="../assets/logo.png" alt="Logo">
    </div>
    <nav class="sidebar-nav">
      <a href="home.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
          <polyline points="9 22 9 12 15 12 15 22" />
        </svg>
        <span>Início</span>
      </a>
      <a href="atestados.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <rect x="5" y="2" width="14" height="20" rx="2" />
          <path d="M9 7h6M9 11h6M9 15h4" />
        </svg>
        <span>Atestados</span>
      </a>
      <a href="lista-colaboradores.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <circle cx="9" cy="7" r="4" />
          <path d="M3 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2" />
          <path d="M16 3.13a4 4 0 0 1 0 7.75" />
          <path d="M21 21v-2a4 4 0 0 0-3-3.85" />
        </svg>
        <span>Colaboradores</span>
      </a>
      <a href="hospitais.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <rect x="2" y="7" width="20" height="15" rx="2" />
          <path d="M8 7V5a4 4 0 0 1 8 0v2" />
          <path d="M12 12v4M10 14h4" />
        </svg>
        <span>Hospitais</span>
      </a>
      <a href="dashboard.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <rect x="2" y="3" width="6" height="6" rx="1" />
          <rect x="9" y="3" width="6" height="6" rx="1" />
          <rect x="16" y="3" width="6" height="6" rx="1" />
          <rect x="2" y="10" width="6" height="6" rx="1" />
          <rect x="9" y="10" width="6" height="6" rx="1" />
          <rect x="16" y="10" width="6" height="6" rx="1" />
        </svg>
        <span>Dashboard</span>
      </a>
    </nav>
    <div class="sidebar-footer">
      <a href="perfil.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <circle cx="12" cy="8" r="4" />
          <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" />
        </svg>
        <span>Meu perfil</span>
      </a>
      <a href="../login.html" class="nav-item nav-logout">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
          <polyline points="16 17 21 12 16 7" />
          <line x1="21" y1="12" x2="9" y2="12" />
        </svg>
        <span>Sair</span>
      </a>
    </div>
  </aside>

  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <div class="main-wrap">

    <header class="topbar">
      <button class="menu-toggle" id="menuToggle" aria-label="Abrir menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="3" y1="6" x2="21" y2="6" />
          <line x1="3" y1="12" x2="21" y2="12" />
          <line x1="3" y1="18" x2="21" y2="18" />
        </svg>
      </button>
      <div class="topbar-greeting">
        <div class="breadcrumb">
          <a href="lista-colaboradores.html" class="breadcrumb-link">Colaboradores</a>
          <span class="breadcrumb-sep">›</span>
          <span class="breadcrumb-atual" id="breadcrumbNome">Ficha</span>
        </div>
      </div>
      <div class="topbar-actions">
        <button class="topbar-btn" aria-label="Notificações" onclick="location.href='notificacoes.html'">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
            <path d="M13.73 21a2 2 0 0 1-3.46 0" />
          </svg>
          <span class="notif-dot"></span>
        </button>
        <div class="topbar-avatar">MR</div>
      </div>
    </header>

    <main class="content">

      <!-- ── Cabeçalho do colaborador ── -->
      <div class="colab-header" id="colabHeader">
        <div class="colab-header-av" id="headerAv"></div>
        <div class="colab-header-info">
          <div class="colab-header-nome" id="headerNome"></div>
          <div class="colab-header-sub" id="headerSub"></div>
          <div class="colab-header-badges" id="headerBadges"></div>
        </div>
        <div class="colab-header-actions">
          <button class="btn-novo-atestado" id="btnNovoAtestado">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
              width="15" height="15">
              <line x1="12" y1="5" x2="12" y2="19" />
              <line x1="5" y1="12" x2="19" y2="12" />
            </svg>
            Novo atestado
          </button>
        </div>
      </div>

      <!-- ── Alerta de reincidência ── -->
      <div class="alerta-reincidencia" id="alertaReincidencia" style="display:none">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" width="16"
          height="16">
          <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z" />
          <line x1="12" y1="9" x2="12" y2="13" />
          <line x1="12" y1="17" x2="12.01" y2="17" />
        </svg>
        <span id="alertaReincidenciaTexto"></span>
      </div>

      <div class="colab-grid">

        <!-- ── Coluna esquerda ── -->
        <div class="colab-col-left">

          <!-- Dados cadastrais -->
          <div class="card-section">
            <div class="card-section-title">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                width="15" height="15">
                <circle cx="12" cy="8" r="4" />
                <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" />
              </svg>
              Dados cadastrais
            </div>
            <div class="dados-lista" id="dadosLista"></div>
          </div>

          <!-- Histórico de funções -->
          <div class="card-section">
            <div class="card-section-title">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                width="15" height="15">
                <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" />
              </svg>
              Histórico de funções
            </div>
            <div class="historico-lista" id="historicoLista"></div>
          </div>

        </div>

        <!-- ── Coluna direita ── -->
        <div class="colab-col-right">

          <!-- Cards de resumo -->
          <div class="resumo-cards" id="resumoCards"></div>

          <!-- Atestados do colaborador -->
          <div class="card-section">
            <div class="card-section-header">
              <div class="card-section-title">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                  width="15" height="15">
                  <rect x="5" y="2" width="14" height="20" rx="2" />
                  <path d="M9 7h6M9 11h6M9 15h4" />
                </svg>
                Atestados
              </div>
              <select class="filtro-mini" id="filtroAno">
                <option value="2025">2025</option>
                <option value="2024">2024</option>
                <option value="2023">2023</option>
              </select>
            </div>
            <div class="table-wrap">
              <table class="table" id="tabelaAtestados">
                <thead>
                  <tr>
                    <th>Tipo</th>
                    <th>Emissão</th>
                    <th>Afastamento</th>
                    <th>Dias</th>
                    <th>CID</th>
                    <th>Status</th>
                  </tr>
                </thead>
                <tbody id="tbodyAtestados"></tbody>
              </table>
            </div>
          </div>

        </div>
      </div>

    </main>
  </div>

  <script src="../js/colaboradores.js"></script>
</body>

</html>
